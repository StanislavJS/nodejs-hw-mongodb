# swagger/components/schemas/contact.yaml

type: object
properties:
  _id:
    type: string
    example: 670e8e2442c45b2f1b8d04a7
  name:
    type: string
    example: 'John Doe'
  email:
    type: string
    example: 'john@example.com'
  phoneNumber:
    type: string
    example: '+380971112233'
  favorite:
    type: boolean
    example: false
  photo:
    type: string
    example: 'https://res.cloudinary.com/demo/image/upload/v1700000000/sample.jpg'
required:
  - _id
  - name
  - email
  - phoneNumber
