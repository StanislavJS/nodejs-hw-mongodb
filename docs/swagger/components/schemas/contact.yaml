type: object
properties:
  _id:
    type: string
    example: '68dc0d9327099318227ee70b'
  name:
    type: string
    example: 'Ivan Petrov'
  phoneNumber:
    type: string
    example: '+380991112233'
  email:
    type: string
    example: 'ivan@example.com'
  contactType:
    type: string
    example: 'work'
  isFavourite:
    type: boolean
    example: true
  photo:
    type: string
    example: 'https://res.cloudinary.com/demo/image/upload/v1699276892/avatar.png'
  userId:
    type: string
    example: '68dc0d17ef704f12b42033f5'
  createdAt:
    type: string
    format: date-time
    example: '2025-10-03T18:12:07.560Z'
  updatedAt:
    type: string
    format: date-time
    example: '2025-10-03T18:12:07.560Z'
required:
  - name
  - phoneNumber
  - email
  - contactType
