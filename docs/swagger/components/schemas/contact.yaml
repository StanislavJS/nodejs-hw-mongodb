# swagger/components/schemas/contact.yaml

type: object
properties:
  _id:
    type: string
    example: 60d0fe4f5311236168a109ca
  name:
    type: string
    example: John Doe
  email:
    type: string
    example: john.doe@example.com
  phoneNumber:
    type: string
    example: +1234567890
  favorite:
    type: boolean
    example: true
