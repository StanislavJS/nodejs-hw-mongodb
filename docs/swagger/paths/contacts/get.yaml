summary: Get all contacts
description: Retrieve all contacts belonging to the authenticated user, with pagination, filtering and sorting options.
tags:
  - Contacts
operationId: getAllContacts
security:
  - bearerAuth: []
parameters:
  - name: page
    in: query
    description: Page number for pagination
    required: false
    schema:
      type: integer
      example: 1
  - name: perPage
    in: query
    description: Number of contacts per page
    required: false
    schema:
      type: integer
      example: 5
  - name: contactType
    in: query
    description: Filter contacts by type (e.g., work, home, personal)
    required: false
    schema:
      type: string
      example: work
  - name: isFavourite
    in: query
    description: Filter contacts by favourite status
    required: false
    schema:
      type: boolean
      example: true
  - name: sortBy
    in: query
    description: Field name to sort by (e.g., name, email)
    required: false
    schema:
      type: string
      example: name
  - name: sortOrder
    in: query
    description: Sort order direction (asc or desc)
    required: false
    schema:
      type: string
      example: asc

responses:
  '200':
    description: Successfully retrieved list of contacts with pagination
    content:
      application/json:
        schema:
          type: object
          properties:
            status:
              type: integer
              example: 200
            message:
              type: string
              example: Successfully found contacts!
            data:
              type: array
              items:
                $ref: '../../components/schemas/Contact.yaml'
            meta:
              type: object
              properties:
                page:
                  type: integer
                  example: 1
                perPage:
                  type: integer
                  example: 5
                totalItems:
                  type: integer
                  example: 48
                totalPages:
                  type: integer
                  example: 10
                hasPreviousPage:
                  type: boolean
                  example: false
                hasNextPage:
                  type: boolean
                  example: true
  '401':
    description: Unauthorized — Missing or invalid token
    content:
      application/json:
        schema:
          type: object
          properties:
            status:
              type: integer
              example: 401
            message:
              type: string
              example: Session expired or invalid
            data:
              type: 'null'
              example: null
