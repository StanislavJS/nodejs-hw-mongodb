tags:
  - Contacts
summary: Get all contacts
operationId: getContacts
security:
  - bearerAuth: []
parameters:
  - in: query
    name: page
    schema:
      type: integer
      example: 1
    description: Page number for pagination
  - in: query
    name: limit
    schema:
      type: integer
      example: 10
    description: Number of contacts per page
  - in: query
    name: favorite
    schema:
      type: boolean
    description: Filter contacts by favorite

responses:
  '200':
    description: List of contacts
    content:
      application/json:
        schema:
          type: object
          properties:
            status:
              type: string
              example: success
            message:
              type: string
              example: Contacts retrieved successfully
            data:
              type: object
              properties:
                contacts:
                  type: array
                  items:
                    $ref: '../../components/schemas/Contact.yaml'
                total:
                  type: integer
                  example: 10
                page:
                  type: integer
                  example: 1
                limit:
                  type: integer
                  example: 10
  '401':
    description: Unauthorized
  '404':
    description: Not found
    content:
      application/json:
        schema:
          type: object
          properties:
            status:
              type: integer
              example: 404
            message:
              type: string
              example: Contact not found
            data:
              type: 'null'
