summary: Get all contacts
description: Retrieve a list of all user contacts. Supports pagination and filtering by favorite status.
tags:
  - Contacts
operationId: getAllContacts
security:
  - bearerAuth: []
parameters:
  - name: page
    in: query
    description: Page number for pagination
    required: false
    schema:
      type: integer
      example: 1
  - name: limit
    in: query
    description: Number of contacts per page
    required: false
    schema:
      type: integer
      example: 10
  - name: favorite
    in: query
    description: Filter contacts by favorite status
    required: false
    schema:
      type: boolean
      example: true
responses:
  '200':
    description: Contacts fetched successfully
    content:
      application/json:
        schema:
          type: object
          properties:
            status:
              type: string
              example: success
            message:
              type: string
              example: Contacts fetched successfully
            data:
              type: array
              items:
                $ref: '../../components/schemas/Contact.yaml'
  '401':
    description: Unauthorized — Missing or invalid token
    content:
      application/json:
        schema:
          type: object
          properties:
            status:
              type: integer
              example: 401
            message:
              type: string
              example: Session expired or invalid
            data:
              type: 'null'
              example: null
