summary: Get contact by ID
tags:
  - Contacts
security:
  - bearerAuth: []
parameters:
  - $ref: '../../../components/parameters/contactId.yaml'
responses:
  '200':
    description: Contact found
    content:
      application/json:
        schema:
          type: object
          properties:
            status:
              type: string
              example: success
            message:
              type: string
              example: Contact fetched successfully
            data:
              $ref: '../../../components/schemas/Contact.yaml'
  '404':
    description: Contact not found
