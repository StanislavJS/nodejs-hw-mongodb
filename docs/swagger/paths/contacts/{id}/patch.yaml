summary: Update contact by ID
description: Update contact fields for a specific contact. Supports partial updates and allows updating the contact's photo.
tags:
  - Contacts
operationId: updateContact
security:
  - bearerAuth: []
parameters:
  - $ref: '../../../components/parameters/contactId.yaml'
requestBody:
  required: true
  content:
    multipart/form-data:
      schema:
        type: object
        properties:
          name:
            type: string
            description: Updated contact name
            example: Jane Doe
          email:
            type: string
            description: Updated contact email
            example: jane@example.com
          phone:
            type: string
            description: Updated contact phone number
            example: '+380987654321'
          favorite:
            type: boolean
            description: Updated favorite status
            example: true
          photo:
            type: string
            format: binary
            description: New contact photo file (optional)
responses:
  '200':
    description: Contact successfully updated
    content:
      application/json:
        schema:
          type: object
          properties:
            status:
              type: string
              example: success
            message:
              type: string
              example: Contact updated successfully
            data:
              $ref: '../../../components/schemas/Contact.yaml'
  '400':
    description: Invalid data provided or bad request
    content:
      application/json:
        schema:
          type: object
          properties:
            status:
              type: integer
              example: 400
            message:
              type: string
              example: Bad request
            data:
              type: 'null'
              example: null
  '401':
    description: Unauthorized — Missing or invalid token
    content:
      application/json:
        schema:
          type: object
          properties:
            status:
              type: integer
              example: 401
            message:
              type: string
              example: Session expired or invalid
            data:
              type: 'null'
              example: null
  '404':
    description: Contact not found
    content:
      application/json:
        schema:
          type: object
          properties:
            status:
              type: integer
              example: 404
            message:
              type: string
              example: Contact not found
            data:
              type: 'null'
              example: null
