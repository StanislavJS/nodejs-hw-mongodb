summary: Update contact by ID
description: Update a specific contact belonging to the authenticated user by its unique identifier.
tags:
  - Contacts
operationId: updateContact
security:
  - bearerAuth: []
parameters:
  - $ref: '../../../components/parameters/contactId.yaml'
requestBody:
  required: true
  content:
    multipart/form-data:
      schema:
        type: object
        properties:
          name:
            type: string
            example: Ivan Petrov
          phoneNumber:
            type: string
            example: +380991112233
          email:
            type: string
            example: ivan@example.com
          contactType:
            type: string
            example: work
          isFavourite:
            type: boolean
            example: false
          photo:
            type: string
            format: binary
responses:
  '200':
    description: Contact updated successfully
    content:
      application/json:
        schema:
          type: object
          properties:
            status:
              type: integer
              example: 200
            message:
              type: string
              example: Contact updated successfully
            data:
              $ref: '../../../components/schemas/Contact.yaml'
  '400':
    description: Invalid input data
    content:
      application/json:
        schema:
          type: object
          properties:
            status:
              type: integer
              example: 400
            message:
              type: string
              example: Invalid input data
            data:
              type: 'null'
              example: null
  '401':
    description: Unauthorized — Missing or invalid token
    content:
      application/json:
        schema:
          type: object
          properties:
            status:
              type: integer
              example: 401
            message:
              type: string
              example: Session expired or invalid
            data:
              type: 'null'
              example: null
  '404':
    description: Contact not found
    content:
      application/json:
        schema:
          type: object
          properties:
            status:
              type: integer
              example: 404
            message:
              type: string
              example: Contact not found
            data:
              type: 'null'
              example: null
