tags:
  - Contacts
summary: Update contact by ID
operationId: updateContact
security:
  - bearerAuth: []
parameters:
  - $ref: '../../../components/parameters/contactId.yaml'
requestBody:
  required: true
  content:
    multipart/form-data:
      schema:
        type: object
        properties:
          name:
            type: string
            example: Jane Doe
          email:
            type: string
            example: jane@example.com
          phoneNumber:
            type: string
            example: '+380971112233'
          favorite:
            type: boolean
            example: true
          photo:
            type: string
            format: binary
responses:
  '200':
    description: Contact updated
    content:
      application/json:
        schema:
          type: object
          properties:
            status:
              type: string
              example: success
            message:
              type: string
              example: Contact updated successfully
            data:
              $ref: '../../../components/schemas/Contact.yaml'
  '404':
    description: Contact not found
    content:
      application/json:
        schema:
          type: object
          properties:
            status:
              type: integer
              example: 404
            message:
              type: string
              example: Contact not found
            data:
              type: 'null'
