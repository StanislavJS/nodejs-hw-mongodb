summary: Create a new contact
description: Create a new contact for the authenticated user.
tags:
  - Contacts
operationId: createContact
security:
  - bearerAuth: []
requestBody:
  required: true
  content:
    multipart/form-data:
      schema:
        type: object
        properties:
          name:
            type: string
            example: Ivan Petrov
          phoneNumber:
            type: string
            example: +380991112233
          email:
            type: string
            example: ivan@example.com
          contactType:
            type: string
            example: work
          isFavourite:
            type: boolean
            example: true
          photo:
            type: string
            format: binary
        required:
          - name
          - phoneNumber
          - email
responses:
  '201':
    description: Contact created successfully
    content:
      application/json:
        schema:
          type: object
          properties:
            status:
              type: integer
              example: 201
            message:
              type: string
              example: Contact created successfully
            data:
              $ref: '../../components/schemas/Contact.yaml'
  '400':
    description: Invalid input data
    content:
      application/json:
        schema:
          type: object
          properties:
            status:
              type: integer
              example: 400
            message:
              type: string
              example: Invalid input data
            data:
              type: 'null'
              example: null
  '401':
    description: Unauthorized — Missing or invalid token
    content:
      application/json:
        schema:
          type: object
          properties:
            status:
              type: integer
              example: 401
            message:
              type: string
              example: Session expired or invalid
            data:
              type: 'null'
              example: null
