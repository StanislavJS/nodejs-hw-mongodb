tags:
  - Contacts
summary: Create a new contact
operationId: createContact
security:
  - bearerAuth: []
requestBody:
  required: true
  content:
    multipart/form-data:
      schema:
        type: object
        properties:
          name:
            type: string
            example: John Doe
          email:
            type: string
            example: john@example.com
          phoneNumber:
            type: string
            example: '+380971112233'
          favorite:
            type: boolean
            example: false
          photo:
            type: string
            format: binary
responses:
  '201':
    description: Contact created
    content:
      application/json:
        schema:
          type: object
          properties:
            status:
              type: string
              example: success
            message:
              type: string
              example: Contact created successfully
            data:
              $ref: '../../components/schemas/Contact.yaml'
  '400':
    $ref: '../../components/responses/BadRequest.yaml'
