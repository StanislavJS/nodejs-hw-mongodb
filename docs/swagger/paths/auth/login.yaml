tags:
  - Auth
summary: Login a user
operationId: loginUser
requestBody:
  description: User login payload
  required: true
  content:
    application/json:
      schema:
        type: object
        properties:
          email:
            type: string
            example: user@example.com
          password:
            type: string
            example: qwerty123
responses:
  200:
    description: Login successful
    content:
      application/json:
        schema:
          type: object
          properties:
            token:
              type: string
              example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9
  401:
    $ref: '../../components/responses/BadRequest.yaml'
